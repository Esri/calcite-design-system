<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0" />
    <title>Demos</title>
    <style>
      a {
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <p>
      Notice in the console how the reference element is not set (from ref callback) on first updates. This might need
      reloading, tweaking the interval, or throttling the network, to repro. based on
      <a href="https://github.com/Esri/calcite-design-system/issues/11514">#11514</a>
    </p>
    <calcite-label layout="inline">
      Toggle block
      <calcite-switch></calcite-switch>
    </calcite-label>
    <calcite-block open></calcite-block>
    <script>
      const [htmlSwitch, block] = document.querySelectorAll("calcite-switch, calcite-block");
      htmlSwitch.addEventListener("calciteSwitchChange", toggleBlockContent);

      function toggleBlockContent() {
        let content = [];

        if (block.matches(":empty")) {
          const testComponent = document.createElement("calcite-test");
          content.push(testComponent);
        }

        if (content.length === 0) {
          block.innerHTML = "";
        } else {
          block.append(...content);
        }
      }

      let testComponent;

      const intervalId = setInterval(async () => {
        htmlSwitch.click();

        const test = document.querySelector("calcite-test");
        if (!test) {
          return;
        }

        testComponent ||= customElements
          .whenDefined("calcite-test")
          .then(() => test.componentOnReady())
          .then(() => {
            console.log("interval cleared");
            clearInterval(intervalId);
          });
      }, 10);
    </script>
  </body>
</html>
